<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — WoodCraft</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>
  .auth-wrapper {
    max-width: 400px;
    margin: 60px auto;
    padding: 40px;
    background: #1a1a2e;
    border-radius: 16px;
    border: 1px solid rgba(212, 175, 55, 0.2);
    box-shadow: 0 12px 30px rgba(0,0,0,0.3);
  }
  .auth-title {
    text-align: center;
    color: var(--primary);
    font-family: 'Playfair Display', serif;
    margin-bottom: 30px;
    font-size: 2rem;
  }
  .error-msg {
    color: #ff4d4d;
    background: rgba(255, 77, 77, 0.1);
    padding: 10px;
    border-radius: 8px;
    text-align: center;
    margin-bottom: 20px;
  }
</style>
</head>
<body>

{% include 'nav.html' %}

<section class="section">
  <div class="auth-wrapper">
    <h1 class="auth-title">Create Account</h1>
    
    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form action="/signup" method="POST">
      <div class="form-group" style="margin-bottom: 20px;">
        <label for="username">Choose a Username</label>
        <input type="text" id="username" name="username" placeholder="Enter username" required style="width: 100%; box-sizing: border-box;">
      </div>
      <div class="form-group" style="margin-bottom: 30px;">
        <label for="password">Create a Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" required style="width: 100%; box-sizing: border-box;">
      </div>
      <button type="submit" class="btn-primary" style="width: 100%;">Sign Up</button>
    </form>
    
    <p style="text-align: center; margin-top: 25px; color: #aaa;">
      Already have an account? <a href="/login" style="color: var(--primary); text-decoration: none;">Login here</a>
    </p>
  </div>
</section>

<footer class="footer">
  <p>🪵 WoodCraft Furniture &nbsp;|&nbsp; Demo System</p>
</footer>

</body>
</html>
