<!-- NAV -->
<nav class="navbar">
  <div class="nav-inner">
    <a href="/" class="brand">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 10px;"><path d="M2 9l3-3 3 3"></path><path d="M13 18H7a2 2 0 01-2-2V6"></path><path d="M22 9l-3-3-3 3"></path><path d="M11 18h6a2 2 0 002-2V6"></path></svg>
      WoodCraft
    </a>
    <div class="nav-links">
      <a href="/" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        Home
      </a>
      {% if session.get('user_id') %}
        <a href="/history" class="nav-item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M19 9l-5 5-4-4-3 3"/></svg>
          History
        </a>
        
        <div class="user-menu">
          <div class="user-menu-btn">
            <div class="avatar">{{ (session.get('username') or 'U')[0]|upper }}</div>
            <span class="username">{{ session.get('username') }}</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
          </div>
          <div class="dropdown-content">
            <div class="dropdown-header">
              <strong>{{ session.get('username') }}</strong>

            </div>
            <hr class="dropdown-divider">
            <a href="/profile" class="dropdown-item">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 00-4-4H9a4 4 0 00-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>

            </a>

          </div>
        </div>
      {% else %}
        <a href="/login" class="btn-outline-sm" style="padding: 0.5rem 1.2rem; border-radius: 8px;">Login</a>
        <a href="/signup" class="btn-primary" style="padding: 0.5rem 1.2rem; border-radius: 8px;">Sign Up</a>
