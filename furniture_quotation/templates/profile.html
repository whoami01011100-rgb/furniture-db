<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile — WoodCraft</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>
  .profile-wrapper {
    max-width: 600px;
    margin: 40px auto;
    padding: 40px;
    background: #1a1a2e;
    border-radius: 16px;
    border: 1px solid rgba(212, 175, 55, 0.2);
    box-shadow: 0 12px 30px rgba(0,0,0,0.3);
  }
  .profile-title {
    text-align: center;
    color: var(--primary);
    font-family: 'Playfair Display', serif;
    margin-bottom: 10px;
    font-size: 2rem;
  }
  .profile-subtitle {
    text-align: center;
    color: #aaa;
    margin-bottom: 30px;
  }
  .success-msg {
    color: #4CAF50;
    background: rgba(76, 175, 80, 0.1);
    padding: 12px;
    border-radius: 8px;
    text-align: center;
    margin-bottom: 20px;
    border: 1px solid rgba(76, 175, 80, 0.3);
  }
</style>
</head>
<body>

{% include 'nav.html' %}

<section class="section">
  <div class="profile-wrapper">
    <h1 class="profile-title">My Profile</h1>
    <p class="profile-subtitle">Manage your personal details</p>
    
    {% if success %}
    <div class="success-msg">{{ success }}</div>
    {% endif %}

    <form action="/profile" method="POST">
      <div class="form-group" style="margin-bottom: 20px;">
        <label for="username">Username (Cannot be changed)</label>
        <input type="text" id="username" value="{{ user.username }}" disabled style="width: 100%; box-sizing: border-box; opacity: 0.7; cursor: not-allowed;">
      </div>
      <div class="form-group" style="margin-bottom: 20px;">
        <label for="full_name">Full Name</label>
        <input type="text" id="full_name" name="full_name" value="{{ user.full_name }}" placeholder="Enter your full name" style="width: 100%; box-sizing: border-box;">
      </div>
      <div class="form-group" style="margin-bottom: 20px;">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" value="{{ user.phone }}" placeholder="+91 98765 43210" style="width: 100%; box-sizing: border-box;">
      </div>
      <div class="form-group" style="margin-bottom: 30px;">
        <label for="address">Delivery Address</label>
        <textarea id="address" name="address" rows="3" placeholder="Enter your full address" style="width: 100%; box-sizing: border-box; padding: 12px; border-radius: 8px; background: rgba(0,0,0,0.2); border: 1px solid #444; color: #fff; font-family: inherit;">{{ user.address }}</textarea>
      </div>
      <button type="submit" class="btn-primary" style="width: 100%;">Save Changes</button>
    </form>
    
  </div>
</section>

<footer class="footer">
  <p>🪵 WoodCraft Furniture &nbsp;|&nbsp; Demo System</p>
</footer>

</body>
</html>
